<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="_theme.css">
<style>
  body {
    background:
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(255, 209, 43, 0.30), transparent 65%),
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(255, 77, 94, 0.10), transparent 65%),
      linear-gradient(180deg, #0B0A08 0%, #14110A 60%, #050403 100%);
  }
  .layout {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 28px;
  }
  .mark-title {
    font-family: var(--display);
    font-weight: 800;
    font-size: 168px;
    line-height: 0.86;
    letter-spacing: -0.045em;
    color: #fff;
    text-transform: uppercase;
  }
  .mark-title .y { color: var(--bv-blue); }
  .mark-tag {
    font-family: var(--display);
    font-weight: 500;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: -0.01em;
  }
  .mark-tag .sep { color: var(--bv-blue); margin: 0 12px; }
  .signature {
    margin-top: 40px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .signature .acid { color: var(--bv-blue); }
</style></head>
<body><div class="slide">
  <div class="slide-top">
    <span>— 13 / End</span>
    <span class="mark">Duck Master</span>
    <span class="right"><span class="accent">●</span> 13 / 13</span>
  </div>

  <div class="layout">
    <h1 class="mark-title">DUCK <span class="y">MASTER</span></h1>
    <p class="mark-tag">
      One duck<span class="sep">·</span>one universe<span class="sep">·</span>300+ assets
    </p>
    <div class="signature">
      Designed by Garri Avetisyan<span class="acid"> · </span>2024 — 2025
    </div>
  </div>

  <div class="slide-bottom">
    <span>End</span>
    <span>Thanks for playing</span>
  </div>
</div></body></html>
